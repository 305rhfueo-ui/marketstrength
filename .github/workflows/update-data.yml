name: Update Market Data

on:
  schedule:
    # 한국 시간(KST) 오전 7시 (UTC 22:00)
    - cron: '0 22 * * *'
    # 한국 시간(KST) 오후 1시 (UTC 04:00)
    - cron: '0 4 * * *'
    # 한국 시간(KST) 오후 9시 (UTC 12:00)
    - cron: '0 12 * * *'
  workflow_dispatch: # 수동 실행을 위한 버튼

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run data update script
        run: python scripts/update_data.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data.json
          # 데이터 변경이 있을 때만 commit & push 진행
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update market data" && git push)
